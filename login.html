<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — NeevTech </title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4fa;
      font-family: 'DM Sans', sans-serif;
      padding: 2rem 1rem;
      position: relative;
      overflow: hidden;
    }

    /* Background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 420px; height: 420px; background: #B5D4F4; opacity: 0.45; top: -80px; right: -80px; }
    .blob-2 { width: 320px; height: 320px; background: #85B7EB; opacity: 0.25; bottom: -60px; left: -60px; }
    .blob-3 { width: 200px; height: 200px; background: #B5D4F4; opacity: 0.2; bottom: 40px; right: 80px; }

    .card {
      position: relative;
      z-index: 1;
      background: #ffffff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 20px;
      padding: 2.5rem 2.25rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 32px rgba(24,95,165,0.07);
    }

    /* Brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }
    .brand-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: #185FA5;
      display: flex; align-items: center; justify-content: center;
    }
    .brand-icon i { color: #E6F1FB; font-size: 20px; }
    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: #1a1a2e;
    }

    /* Heading */
    .login-title {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: #1a1a2e;
      font-weight: 400;
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: 14px;
      color: #6b7280;
      font-weight: 300;
      margin-bottom: 2rem;
    }

    /* Fields */
    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #6b7280;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-wrap .input-icon {
      position: absolute;
      left: 12px;
      font-size: 17px;
      color: #9ca3af;
      pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      padding: 11px 12px 11px 40px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #f9fafb;
      color: #111827;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .input-wrap input:focus {
      border-color: #185FA5;
      box-shadow: 0 0 0 3px rgba(24,95,165,0.12);
      background: #ffffff;
    }
    .input-wrap input::placeholder { color: #9ca3af; }

    .toggle-pw {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      font-size: 17px;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    .toggle-pw:hover { color: #6b7280; }

    /* Forgot */
    .row-forgot {
      display: flex;
      justify-content: flex-end;
      margin-top: -0.4rem;
      margin-bottom: 1.5rem;
    }
    .forgot-link {
      font-size: 13px;
      color: #185FA5;
      text-decoration: none;
      font-weight: 400;
    }
    .forgot-link:hover { text-decoration: underline; }

    /* Login button */
    .btn-login {
      width: 100%;
      padding: 12px 0;
      background: #185FA5;
      color: #E6F1FB;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-login:hover { background: #0C447C; }
    .btn-login:active { transform: scale(0.98); }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.5rem 0;
    }
    .divider span { flex: 1; height: 1px; background: #e5e7eb; }
    .divider p { font-size: 12px; color: #9ca3af; white-space: nowrap; }

    /* Google button */
    .btn-google {
      width: 100%;
      padding: 11px 0;
      background: #f9fafb;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      transition: background 0.15s;
    }
    .btn-google:hover { background: #f3f4f6; }
    .google-icon { width: 18px; height: 18px; }

    /* Sign up row */
    .signup-row {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 13px;
      color: #6b7280;
    }
    .signup-row a { color: #185FA5; text-decoration: none; font-weight: 500; }
    .signup-row a:hover { text-decoration: underline; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #0C447C;
      color: #E6F1FB;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 100;
    }
    .toast.show { opacity: 1; }

    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; }
      .card { background: #1e293b; border-color: rgba(255,255,255,0.08); }
      .brand-name, .login-title { color: #f1f5f9; }
      .login-sub, .field label { color: #94a3b8; }
      .input-wrap input { background: #0f172a; border-color: #334155; color: #f1f5f9; }
      .input-wrap input:focus { background: #1e293b; }
      .input-wrap input::placeholder { color: #475569; }
      .input-wrap .input-icon, .toggle-pw { color: #475569; }
      .btn-google { background: #0f172a; border-color: #334155; color: #e2e8f0; }
      .btn-google:hover { background: #1e293b; }
      .divider span { background: #334155; }
      .signup-row { color: #94a3b8; }
    }
  </style>
</head>
<body>

  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="card">
    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon"><i class="ti ti-bolt"></i></div>
      <span class="brand-name">NeevTech</span>
    </div>

    <h1 class="login-title">Welcome back</h1>
    <p class="login-sub">Sign in to continue to your workspace</p>

    <!-- Email -->
    <div class="field">
      <label for="email">Email address</label>
      <div class="input-wrap">
        <i class="ti ti-mail input-icon"></i>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
    </div>

    <!-- Password -->
    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <i class="ti ti-lock input-icon"></i>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        <button class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
          <i class="ti ti-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <!-- Forgot password -->
    <div class="row-forgot">
      <a href="#" class="forgot-link" id="forgotLink">Forgot password?</a>
    </div>

    <!-- Login button -->
    <button class="btn-login" id="loginBtn">
      Sign in <i class="ti ti-arrow-right"></i>
    </button>

    <!-- Divider -->
    <div class="divider">
      <span></span><p>or continue with</p><span></span>
    </div>

    <!-- Google -->
    <button class="btn-google" id="googleBtn">
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <p class="signup-row">Don't have an account? <a href="#">Create one</a></p>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // Toggle password visibility
    const pw = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    document.getElementById('togglePw').addEventListener('click', () => {
      const isHidden = pw.type === 'password';
      pw.type = isHidden ? 'text' : 'password';
      eyeIcon.className = isHidden ? 'ti ti-eye-off' : 'ti ti-eye';
    });

    // Toast helper
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // Login
    document.getElementById('loginBtn').addEventListener('click', () => {
      const email = document.getElementById('email').value.trim();
      const pass = pw.value;
      if (!email || !pass) { showToast('Please fill in all fields'); return; }
      if (!email.includes('@')) { showToast('Enter a valid email address'); return; }
      showToast('Signing you in…');
    });

    // Google
    document.getElementById('googleBtn').addEventListener('click', () => {
      showToast('Redirecting to Google…');
    });

    // Forgot password
    document.getElementById('forgotLink').addEventListener('click', (e) => {
      e.preventDefault();
      showToast('Password reset link sent!');
    });
  </script>
</body>
</html>
